# Render Deployment Configuration
# Deploy at: https://render.com

# Render Blueprint Configuration
services:
  # Backend Web Service
  - type: web
    name: vendor-verification-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 4 backend.app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vendors-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"

  # PostgreSQL Database
  - type: pserv
    name: vendors-db
    plan: free
    databaseName: vendors

# For frontend, use Render's Static Site service:
# 1. Build the frontend: cd frontend && npm run build
# 2. Deploy the 'build' folder as a Static Site
# 3. Set REACT_APP_API_URL to your backend URL
